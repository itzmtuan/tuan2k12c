<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🌀 Volume Shader 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #fff;
            height: 100vh;
            width: 100vw;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }

        /* === UI ĐIỀU KHIỂN === */
        .control-panel {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 1rem 2rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 1.5rem 2.5rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            min-width: 280px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .control-group label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
            min-width: 50px;
        }

        .control-group input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 140px;
            height: 4px;
            background: linear-gradient(90deg, #3b82f6, #a78bfa);
            border-radius: 10px;
            outline: none;
            transition: 0.2s;
            cursor: pointer;
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #a78bfa, #7c3aed);
            border: 2px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            box-shadow: 0 0 20px rgba(167, 139, 250, 0.3);
            transition: 0.15s;
        }

        .control-group input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .control-group .value-display {
            font-size: 0.85rem;
            font-weight: 700;
            color: #e2e8f0;
            min-width: 32px;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        /* === RESPONSIVE === */
        @media (max-width: 700px) {
            .control-panel {
                bottom: 16px;
                padding: 0.8rem 1.2rem;
                border-radius: 40px;
                gap: 0.8rem 1.2rem;
                min-width: unset;
                width: calc(100% - 32px);
            }
            .control-group input[type="range"] {
                width: 80px;
            }
            .control-group label {
                font-size: 0.65rem;
                min-width: 36px;
            }
            .control-group .value-display {
                font-size: 0.75rem;
                min-width: 24px;
            }
        }

        @media (max-width: 450px) {
            .control-panel {
                flex-direction: column;
                gap: 0.4rem;
                padding: 0.6rem 1rem;
                border-radius: 30px;
                bottom: 12px;
            }
            .control-group {
                width: 100%;
                justify-content: space-between;
            }
            .control-group input[type="range"] {
                flex: 1;
                width: unset;
            }
        }

        /* === LOADING === */
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            color: #94a3b8;
            font-size: 1.2rem;
            letter-spacing: 2px;
            animation: pulseLoading 1.5s ease-in-out infinite;
        }
        @keyframes pulseLoading {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 1;
            }
        }

        /* FPS hiển thị nhỏ */
        .fps-counter {
            position: fixed;
            top: 16px;
            right: 20px;
            z-index: 10;
            color: rgba(255, 255, 255, 0.15);
            font-size: 0.7rem;
            font-family: monospace;
            pointer-events: none;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <!-- Loading -->
    <div class="loading" id="loading">⏳ Đang tải Volume Shader...</div>

    <!-- Container cho Three.js -->
    <div id="canvas-container"></div>

    <!-- FPS -->
    <div class="fps-counter" id="fpsCounter">-- FPS</div>

    <!-- === Bảng điều khiển === -->
    <div class="control-panel" id="controls">
        <!-- Độ nặng (Density) -->
        <div class="control-group">
            <label>🌀 Nặng</label>
            <input type="range" id="densitySlider" min="0.1" max="3.0" step="0.01" value="1.2" />
            <span class="value-display" id="densityValue">1.20</span>
        </div>

        <!-- Tốc độ xoay -->
        <div class="control-group">
            <label>⚡ Xoay</label>
            <input type="range" id="speedSlider" min="0.0" max="0.8" step="0.01" value="0.3" />
            <span class="value-display" id="speedValue">0.30</span>
        </div>

        <!-- Độ sáng / Intensity -->
        <div class="control-group">
            <label>💡 Sáng</label>
            <input type="range" id="intensitySlider" min="0.2" max="2.5" step="0.01" value="1.0" />
            <span class="value-display" id="intensityValue">1.00</span>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- THREE.JS + SHADER                                         -->
    <!-- ============================================================ -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        // ---- IMPORTS ----
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

        // ---- DOM ----
        const container = document.getElementById('canvas-container');
        const loadingEl = document.getElementById('loading');
        const fpsEl = document.getElementById('fpsCounter');

        const densitySlider = document.getElementById('densitySlider');
        const densityValue = document.getElementById('densityValue');
        const speedSlider = document.getElementById('speedSlider');
        const speedValue = document.getElementById('speedValue');
        const intensitySlider = document.getElementById('intensitySlider');
        const intensityValue = document.getElementById('intensityValue');

        // ---- SCENE ----
        const scene = new THREE.Scene();

        // ---- CAMERA ----
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(3, 2, 5);
        camera.lookAt(0, 0, 0);

        // ---- RENDERER ----
        const renderer = new THREE.WebGLRenderer({
            antialias: true,
            alpha: false,
            powerPreference: "high-performance"
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x0a0a0f, 1);
        container.appendChild(renderer.domElement);

        // ---- CONTROLS (cho phép kéo xoay) ----
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.rotateSpeed = 0.8;
        controls.target.set(0, 0, 0);
        controls.update();

        // ---- SHADER UNIFORMS ----
        const uniforms = {
            uTime: { value: 0 },
            uDensity: { value: parseFloat(densitySlider.value) },
            uSpeed: { value: parseFloat(speedSlider.value) },
            uIntensity: { value: parseFloat(intensitySlider.value) },
            uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
            uMouse: { value: new THREE.Vector2(0.5, 0.5) }
        };

        // ---- VERTEX SHADER ----
        const vertexShader = `
                    varying vec3 vPosition;
                    varying vec2 vUv;
                    void main() {
                        vUv = uv;
                        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                        vPosition = mvPosition.xyz;
                        gl_Position = projectionMatrix * mvPosition;
                    }
                `;

        // ---- FRAGMENT SHADER (VOLUME SHADER) ----
        const fragmentShader = `
                    precision highp float;

                    varying vec3 vPosition;
                    varying vec2 vUv;

                    uniform float uTime;
                    uniform float uDensity;
                    uniform float uSpeed;
                    uniform float uIntensity;
                    uniform vec2  uResolution;
                    uniform vec2  uMouse;

                    // ---- Hàm noise 3D đơn giản ----
                    float hash(vec3 p) {
                        p = fract(p * 0.3183099 + .1);
                        p *= 17.0;
                        return fract(p.x * p.y * p.z * (p.x + p.y + p.z));
                    }

                    float noise(vec3 p) {
                        vec3 i = floor(p);
                        vec3 f = fract(p);
                        f = f * f * (3.0 - 2.0 * f);
                        return mix(
                            mix(
                                mix(hash(i + vec3(0,0,0)), hash(i + vec3(1,0,0)), f.x),
                                mix(hash(i + vec3(0,1,0)), hash(i + vec3(1,1,0)), f.x),
                                f.y
                            ),
                            mix(
                                mix(hash(i + vec3(0,0,1)), hash(i + vec3(1,0,1)), f.x),
                                mix(hash(i + vec3(0,1,1)), hash(i + vec3(1,1,1)), f.x),
                                f.y
                            ),
                            f.z
                        );
                    }

                    // ---- FBM (Fractal Brownian Motion) ----
                    float fbm(vec3 p, int octaves) {
                        float value = 0.0;
                        float amp = 0.5;
                        float freq = 1.0;
                        for (int i = 0; i < 5; i++) {
                            if (i >= octaves) break;
                            value += amp * noise(p * freq);
                            freq *= 2.0;
                            amp *= 0.5;
                        }
                        return value;
                    }

                    void main() {
                        // Tọa độ UV + thời gian
                        vec2 uv = vUv;
                        float time = uTime * uSpeed;

                        // Tạo 3D position để sample noise
                        vec3 pos = vec3(uv * 2.0 - 1.0, 0.0);
                        // Thêm depth dựa trên vị trí z (để có hiệu ứng volume)
                        float depth = vPosition.z * 0.8 + 0.5;

                        // Scale để có nhiều chi tiết
                        vec3 p = pos * 2.5;
                        p.z += time * 0.15;
                        p.x += time * 0.05;
                        p.y += time * 0.08;

                        // ---- Lấy noise ----
                        float n = fbm(p, 5);

                        // Thêm lớp noise thứ 2 để tạo chi tiết mịn hơn
                        vec3 p2 = p * 3.0 + vec3(time * 0.1, time * 0.07, time * 0.05);
                        float n2 = fbm(p2, 3);
                        n = mix(n, n2, 0.3);

                        // Áp dụng độ nặng (density) - làm sắc nét hoặc mờ hơn
                        float density = uDensity;
                        float shape = 1.0 - abs(n - 0.5) * 2.0;
                        shape = pow(shape, density);

                        // Thêm hiệu ứng ánh sáng dựa trên vị trí chuột
                        float mouseInfluence = 0.3 + 0.7 * (1.0 - distance(uv, uMouse) * 1.2);
                        shape *= mouseInfluence;

                        // Màu sắc gradient dựa trên n và vị trí
                        vec3 color1 = vec3(0.1, 0.05, 0.25); // tím đậm
                        vec3 color2 = vec3(0.8, 0.2, 0.6);   // hồng tím
                        vec3 color3 = vec3(0.1, 0.8, 0.9);   // xanh ngọc
                        vec3 color4 = vec3(0.9, 0.3, 0.1);   // cam

                        // Mix màu theo noise
                        float mixVal = n * 1.2 + 0.2;
                        vec3 col = mix(color1, color2, smoothstep(0.0, 0.5, mixVal));
                        col = mix(col, color3, smoothstep(0.3, 0.7, mixVal));
                        col = mix(col, color4, smoothstep(0.6, 1.0, mixVal));

                        // Thêm độ sáng
                        float intensity = uIntensity;
                        col *= shape * intensity * 1.2;

                        // Thêm glow ở trung tâm
                        float distToCenter = distance(uv, vec2(0.5, 0.5));
                        float glow = exp(-distToCenter * 2.5) * 0.5;
                        col += vec3(0.3, 0.1, 0.6) * glow * intensity;

                        // Thêm highlight sáng
                        float highlight = pow(shape, 4.0) * 0.8;
                        col += vec3(1.0, 0.9, 1.0) * highlight * intensity;

                        // Vignette (tối viền)
                        float vignette = 1.0 - distToCenter * 0.5;
                        col *= vignette;

                        // Gamma và xuất
                        col = clamp(col, 0.0, 1.0);
                        gl_FragColor = vec4(col, 1.0);
                    }
                `;

        // ---- TẠO MATERIAL VÀ MESH ----
        const geometry = new THREE.PlaneGeometry(4, 4);
        const material = new THREE.ShaderMaterial({
            uniforms: uniforms,
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            side: THREE.DoubleSide,
            transparent: false,
            depthWrite: false,
        });

        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.set(0, 0, 0);
        scene.add(mesh);

        // ---- ẨN LOADING ----
        loadingEl.style.display = 'none';

        // ---- RESIZE ----
        function onResize() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
            uniforms.uResolution.value.set(w, h);
        }
        window.addEventListener('resize', onResize);

        // ---- MOUSE TRACKING ----
        const mouse = new THREE.Vector2(0.5, 0.5);
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX / window.innerWidth;
            mouse.y = 1.0 - (e.clientY / window.innerHeight);
            uniforms.uMouse.value.set(mouse.x, mouse.y);
        });

        // ---- FPS COUNTER ----
        let frameCount = 0;
        let fpsTime = 0;

        // ---- ANIMATION LOOP ----
        function animate(time) {
            requestAnimationFrame(animate);

            // Update uniforms
            uniforms.uTime.value = time * 0.001;

            // Update controls
            controls.update();

            // Render
            renderer.render(scene, camera);

            // FPS
            frameCount++;
            if (time - fpsTime >= 1000) {
                fpsEl.textContent = `${frameCount} FPS`;
                frameCount = 0;
                fpsTime = time;
            }
        }

        animate(0);

        // ---- UI CONTROLS ----
        densitySlider.addEventListener('input', () => {
            const val = parseFloat(densitySlider.value);
            uniforms.uDensity.value = val;
            densityValue.textContent = val.toFixed(2);
        });

        speedSlider.addEventListener('input', () => {
            const val = parseFloat(speedSlider.value);
            uniforms.uSpeed.value = val;
            speedValue.textContent = val.toFixed(2);
        });

        intensitySlider.addEventListener('input', () => {
            const val = parseFloat(intensitySlider.value);
            uniforms.uIntensity.value = val;
            intensityValue.textContent = val.toFixed(2);
        });

        // ---- XỬ LÝ TOUCH CHO MOBILE ----
        window.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                const touch = e.touches[0];
                mouse.x = touch.clientX / window.innerWidth;
                mouse.y = 1.0 - (touch.clientY / window.innerHeight);
                uniforms.uMouse.value.set(mouse.x, mouse.y);
            }
        }, { passive: true });

        console.log('🌀 Volume Shader đã khởi động!');
        console.log('💡 Điều chỉnh thanh trượt để thay đổi hiệu ứng.');
    </script>

</body>
</html>
