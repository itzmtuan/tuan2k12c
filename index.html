<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🌀 Volume Shader NẶNG (Lag)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #fff;
            height: 100vh;
            width: 100vw;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }

        .control-panel {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 1rem 2rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 1.5rem 2.5rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            min-width: 280px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .control-group label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
            min-width: 50px;
        }

        .control-group input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 140px;
            height: 4px;
            background: linear-gradient(90deg, #3b82f6, #a78bfa);
            border-radius: 10px;
            outline: none;
            transition: 0.2s;
            cursor: pointer;
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #a78bfa, #7c3aed);
            border: 2px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            box-shadow: 0 0 20px rgba(167, 139, 250, 0.3);
            transition: 0.15s;
        }

        .control-group input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .control-group .value-display {
            font-size: 0.85rem;
            font-weight: 700;
            color: #e2e8f0;
            min-width: 32px;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        .fps-counter {
            position: fixed;
            top: 16px;
            right: 20px;
            z-index: 10;
            color: rgba(255, 255, 255, 0.15);
            font-size: 0.7rem;
            font-family: monospace;
            pointer-events: none;
            letter-spacing: 0.5px;
        }

        .lag-indicator {
            position: fixed;
            top: 16px;
            left: 20px;
            z-index: 10;
            color: #ff6b6b;
            font-size: 0.8rem;
            font-weight: 700;
            background: rgba(0, 0, 0, 0.5);
            padding: 0.3rem 1rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 100, 100, 0.2);
            animation: pulseLag 1s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes pulseLag {
            0%,
            100% {
                opacity: 0.6;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.05);
            }
        }

        @media (max-width: 700px) {
            .control-panel {
                bottom: 16px;
                padding: 0.8rem 1.2rem;
                border-radius: 40px;
                gap: 0.8rem 1.2rem;
                min-width: unset;
                width: calc(100% - 32px);
            }
            .control-group input[type="range"] {
                width: 80px;
            }
            .control-group label {
                font-size: 0.65rem;
                min-width: 36px;
            }
            .control-group .value-display {
                font-size: 0.75rem;
                min-width: 24px;
            }
        }

        @media (max-width: 450px) {
            .control-panel {
                flex-direction: column;
                gap: 0.4rem;
                padding: 0.6rem 1rem;
                border-radius: 30px;
                bottom: 12px;
            }
            .control-group {
                width: 100%;
                justify-content: space-between;
            }
            .control-group input[type="range"] {
                flex: 1;
                width: unset;
            }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="lag-indicator">🔥 LAG MODE (Nặng)</div>
    <div class="fps-counter" id="fpsCounter">-- FPS</div>

    <div class="control-panel" id="controls">
        <div class="control-group">
            <label>🌀 Nặng</label>
            <input type="range" id="densitySlider" min="0.5" max="5.0" step="0.1" value="2.5" />
            <span class="value-display" id="densityValue">2.50</span>
        </div>
        <div class="control-group">
            <label>⚡ Xoay</label>
            <input type="range" id="speedSlider" min="0.0" max="0.5" step="0.01" value="0.15" />
            <span class="value-display" id="speedValue">0.15</span>
        </div>
        <div class="control-group">
            <label>💡 Sáng</label>
            <input type="range" id="intensitySlider" min="0.2" max="3.0" step="0.1" value="1.5" />
            <span class="value-display" id="intensityValue">1.50</span>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

        const container = document.getElementById('canvas-container');
        const fpsEl = document.getElementById('fpsCounter');

        const densitySlider = document.getElementById('densitySlider');
        const densityValue = document.getElementById('densityValue');
        const speedSlider = document.getElementById('speedSlider');
        const speedValue = document.getElementById('speedValue');
        const intensitySlider = document.getElementById('intensitySlider');
        const intensityValue = document.getElementById('intensityValue');

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(3, 2, 5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({
            antialias: true,
            alpha: false,
            powerPreference: "high-performance"
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x0a0a0f, 1);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.rotateSpeed = 0.8;
        controls.target.set(0, 0, 0);
        controls.update();

        const uniforms = {
            uTime: { value: 0 },
            uDensity: { value: parseFloat(densitySlider.value) },
            uSpeed: { value: parseFloat(speedSlider.value) },
            uIntensity: { value: parseFloat(intensitySlider.value) },
            uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
            uMouse: { value: new THREE.Vector2(0.5, 0.5) },
            uFrame: { value: 0 }
        };

        const vertexShader = `
                    varying vec3 vPosition;
                    varying vec2 vUv;
                    void main() {
                        vUv = uv;
                        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                        vPosition = mvPosition.xyz;
                        gl_Position = projectionMatrix * mvPosition;
                    }
                `;

        // ============================================================
        // SHADER SIÊU NẶNG - NHIỀU OCTAVES + NHIỀU PHÉP TOÁN
        // ============================================================
        const fragmentShader = `
                    precision highp float;

                    varying vec3 vPosition;
                    varying vec2 vUv;

                    uniform float uTime;
                    uniform float uDensity;
                    uniform float uSpeed;
                    uniform float uIntensity;
                    uniform vec2  uResolution;
                    uniform vec2  uMouse;
                    uniform float uFrame;

                    // ---- NOISE HÀM NẶNG (nhiều phép toán) ----
                    float hash(vec3 p) {
                        p = fract(p * 0.3183099 + 0.1);
                        p *= 17.0;
                        return fract(p.x * p.y * p.z * (p.x + p.y + p.z + 0.5));
                    }

                    float hash21(vec2 p) {
                        p = fract(p * vec2(234.34, 435.345));
                        p += dot(p, p + 19.19);
                        return fract(p.x * p.y);
                    }

                    // Noise 3D với nhiều phép toán hơn
                    float noise3D(vec3 p) {
                        vec3 i = floor(p);
                        vec3 f = fract(p);
                        f = f * f * (3.0 - 2.0 * f);

                        float a = hash(i + vec3(0.0, 0.0, 0.0));
                        float b = hash(i + vec3(1.0, 0.0, 0.0));
                        float c = hash(i + vec3(0.0, 1.0, 0.0));
                        float d = hash(i + vec3(1.0, 1.0, 0.0));
                        float e = hash(i + vec3(0.0, 0.0, 1.0));
                        float f_ = hash(i + vec3(1.0, 0.0, 1.0));
                        float g = hash(i + vec3(0.0, 1.0, 1.0));
                        float h = hash(i + vec3(1.0, 1.0, 1.0));

                        float mix1 = mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
                        float mix2 = mix(mix(e, f_, f.x), mix(g, h, f.x), f.y);
                        return mix(mix1, mix2, f.z);
                    }

                    // Noise 2D cho lớp phụ
                    float noise2D(vec2 p) {
                        vec2 i = floor(p);
                        vec2 f = fract(p);
                        f = f * f * (3.0 - 2.0 * f);
                        float a = hash21(i);
                        float b = hash21(i + vec2(1.0, 0.0));
                        float c = hash21(i + vec2(0.0, 1.0));
                        float d = hash21(i + vec2(1.0, 1.0));
                        return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
                    }

                    // FBM - 8 OCTAVES (rất nặng)
                    float fbm8(vec3 p) {
                        float value = 0.0;
                        float amp = 0.5;
                        float freq = 1.0;
                        for (int i = 0; i < 8; i++) {
                            value += amp * noise3D(p * freq);
                            freq *= 2.1;
                            amp *= 0.48;
                        }
                        return value;
                    }

                    // FBM thứ 2 với số octaves khác (thêm nặng)
                    float fbm6(vec3 p) {
                        float value = 0.0;
                        float amp = 0.5;
                        float freq = 0.8;
                        for (int i = 0; i < 6; i++) {
                            value += amp * noise3D(p * freq + 1.7);
                            freq *= 2.3;
                            amp *= 0.45;
                        }
                        return value;
                    }

                    // Domain Warp (làm méo noise, rất nặng)
                    float domainWarp(vec3 p) {
                        vec3 q = vec3(
                            fbm8(p + vec3(0.0, 0.0, 0.0)),
                            fbm8(p + vec3(5.2, 1.3, 2.8)),
                            fbm8(p + vec3(1.7, 9.2, 3.4))
                        );
                        vec3 r = vec3(
                            fbm8(p + 4.0 * q + vec3(1.7, 9.2, 0.0) + 0.15 * uTime),
                            fbm8(p + 4.0 * q + vec3(8.3, 2.8, 0.0) + 0.12 * uTime),
                            fbm8(p + 4.0 * q + vec3(3.1, 6.5, 0.0) + 0.10 * uTime)
                        );
                        return fbm8(p + 2.0 * r);
                    }

                    void main() {
                        vec2 uv = vUv;
                        float time = uTime * uSpeed;

                        // Tạo 3D position
                        vec3 pos = vec3(uv * 2.0 - 1.0, 0.0);
                        float depth = vPosition.z * 0.8 + 0.5;

                        // Scale và xoay
                        vec3 p = pos * 2.8;
                        p.z += time * 0.12;
                        p.x += time * 0.04 + sin(time * 0.1) * 0.1;
                        p.y += time * 0.06 + cos(time * 0.08) * 0.1;

                        // ---- LẤY NHIỀU LỚP NOISE (NẶNG) ----
                        float n1 = domainWarp(p);
                        float n2 = fbm8(p * 1.7 + vec3(time * 0.07, time * 0.05, time * 0.03));
                        float n3 = fbm6(p * 2.3 + vec3(time * 0.09, time * 0.11, time * 0.07));
                        float n4 = noise3D(p * 4.0 + vec3(time * 0.15, time * 0.12, time * 0.09));

                        // Kết hợp nhiều lớp
                        float n = (n1 * 0.6 + n2 * 0.25 + n3 * 0.1 + n4 * 0.05);

                        // Thêm noise 2D cho chi tiết bề mặt
                        vec2 p2d = uv * 12.0 + vec2(time * 0.02, time * 0.015);
                        float n2d = noise2D(p2d);
                        n = mix(n, n2d, 0.08);

                        // Áp dụng density (nặng hơn với pow)
                        float density = uDensity;
                        float shape = 1.0 - abs(n - 0.5) * 2.0;
                        shape = pow(shape, density * 1.2);

                        // Hiệu ứng ánh sáng chuột (nhiều phép toán)
                        float mouseDist = distance(uv, uMouse);
                        float mouseInfluence = 0.3 + 0.7 * (1.0 - mouseDist * 1.5);
                        mouseInfluence = pow(mouseInfluence, 0.8);
                        shape *= mouseInfluence;

                        // Thêm hiệu ứng sóng (nặng)
                        float wave = sin(uv.x * 30.0 + time * 0.5) * cos(uv.y * 30.0 + time * 0.4) * 0.05;
                        shape += wave * 0.1;

                        // ---- MÀU SẮC PHỨC TẠP (nhiều phép toán) ----
                        vec3 color1 = vec3(0.05, 0.02, 0.15);
                        vec3 color2 = vec3(0.8, 0.1, 0.6);
                        vec3 color3 = vec3(0.05, 0.7, 0.9);
                        vec3 color4 = vec3(0.9, 0.2, 0.05);
                        vec3 color5 = vec3(0.1, 0.9, 0.3);
                        vec3 color6 = vec3(0.9, 0.8, 0.1);

                        float mixVal = n * 1.5 + 0.2 + sin(time * 0.05) * 0.05;
                        vec3 col = mix(color1, color2, smoothstep(0.0, 0.3, mixVal));
                        col = mix(col, color3, smoothstep(0.2, 0.5, mixVal));
                        col = mix(col, color4, smoothstep(0.4, 0.7, mixVal));
                        col = mix(col, color5, smoothstep(0.6, 0.85, mixVal));
                        col = mix(col, color6, smoothstep(0.8, 1.0, mixVal));

                        // Thêm độ sáng
                        float intensity = uIntensity;
                        col *= shape * intensity * 1.4;

                        // Glow trung tâm (nhiều lớp)
                        float distToCenter = distance(uv, vec2(0.5, 0.5));
                        float glow1 = exp(-distToCenter * 2.5) * 0.5;
                        float glow2 = exp(-distToCenter * 5.0) * 0.3;
                        float glow3 = exp(-distToCenter * 0.8) * 0.2;
                        col += vec3(0.3, 0.1, 0.6) * glow1 * intensity;
                        col += vec3(0.6, 0.2, 0.8) * glow2 * intensity;
                        col += vec3(0.1, 0.4, 0.8) * glow3 * intensity;

                        // Highlight
                        float highlight = pow(shape, 5.0) * 0.9;
                        col += vec3(1.0, 0.9, 1.0) * highlight * intensity;

                        // Thêm hiệu ứng hạt (nặng)
                        vec2 grainUV = uv * 400.0 + vec2(time * 0.01);
                        float grain = hash21(grainUV);
                        col += (grain - 0.5) * 0.03 * intensity;

                        // Vignette
                        float vignette = 1.0 - distToCenter * 0.6;
                        col *= vignette;

                        // Thêm nhiễu màu (nặng)
                        float colorNoise = hash21(uv * 300.0 + time * 0.01);
                        col += (colorNoise - 0.5) * 0.02;

                        col = clamp(col, 0.0, 1.0);
                        gl_FragColor = vec4(col, 1.0);
                    }
                `;

        const geometry = new THREE.PlaneGeometry(4, 4);
        const material = new THREE.ShaderMaterial({
            uniforms: uniforms,
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            side: THREE.DoubleSide,
            transparent: false,
            depthWrite: false,
        });

        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.set(0, 0, 0);
        scene.add(mesh);

        function onResize() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
            uniforms.uResolution.value.set(w, h);
        }
        window.addEventListener('resize', onResize);

        const mouse = new THREE.Vector2(0.5, 0.5);
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX / window.innerWidth;
            mouse.y = 1.0 - (e.clientY / window.innerHeight);
            uniforms.uMouse.value.set(mouse.x, mouse.y);
        });

        window.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                const touch = e.touches[0];
                mouse.x = touch.clientX / window.innerWidth;
                mouse.y = 1.0 - (touch.clientY / window.innerHeight);
                uniforms.uMouse.value.set(mouse.x, mouse.y);
            }
        }, { passive: true });

        let frameCount = 0;
        let fpsTime = 0;
        let frame = 0;

        function animate(time) {
            requestAnimationFrame(animate);
            frame++;

            uniforms.uTime.value = time * 0.001;
            uniforms.uFrame.value = frame;

            controls.update();
            renderer.render(scene, camera);

            frameCount++;
            if (time - fpsTime >= 1000) {
                fpsEl.textContent = `${frameCount} FPS`;
                frameCount = 0;
                fpsTime = time;
            }
        }

        animate(0);

        densitySlider.addEventListener('input', () => {
            const val = parseFloat(densitySlider.value);
            uniforms.uDensity.value = val;
            densityValue.textContent = val.toFixed(2);
        });

        speedSlider.addEventListener('input', () => {
            const val = parseFloat(speedSlider.value);
            uniforms.uSpeed.value = val;
            speedValue.textContent = val.toFixed(2);
        });

        intensitySlider.addEventListener('input', () => {
            const val = parseFloat(intensitySlider.value);
            uniforms.uIntensity.value = val;
            intensityValue.textContent = val.toFixed(2);
        });

        console.log('🔥 Volume Shader NẶNG đã khởi động!');
        console.log('💀 Chuẩn bị tinh thần lag nhé!');
    </script>

</body>
</html>
